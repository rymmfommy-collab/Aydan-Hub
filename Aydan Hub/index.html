<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="pguMl4tskDKely2U8fS1zJ-V4GZD-fVGwDvB8wbOeVo" />
    <title>Aydan Hub | Metaverse</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --p: #7d5fff; --s: #ff00de; --bg: #070512; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* HEADER - FIXED & VISIBLE */
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 10px 5%; position: fixed; top: 0; width: 100%; 
            box-sizing: border-box; z-index: 10000; background: rgba(7, 5, 18, 0.95);
            border-bottom: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(15px);
        }
        .logo-box { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .wolf-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--p), var(--s)); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px rgba(125,95,255,0.4); }
        .wolf-icon svg { width: 22px; fill: white; }
        .logo-name { font-weight: 900; letter-spacing: 2px; font-size: 1.1rem; }

        nav { display: flex; gap: 12px; }
        .nav-btn { color: #fff; text-decoration: none; font-size: 0.7rem; font-weight: 900; text-transform: uppercase; cursor: pointer; padding: 8px; transition: 0.3s; }
        .nav-btn:hover { color: var(--s); text-shadow: 0 0 10px var(--s); }

        /* SECTIONS */
        #hero { height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; background: radial-gradient(circle at center, #1a103d 0%, #070512 70%); }
        .hero-title { font-size: clamp(3rem, 15vw, 6rem); font-weight: 900; letter-spacing: -2px; }

        #content { display: none; padding: 100px 5% 50px; min-height: 100vh; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        
        /* CARD STYLE */
        .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 15px; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: var(--p); }
        .card-img { width: 100%; height: 160px; border-radius: 12px; background-size: cover; background-position: center; margin-bottom: 15px; }
        
        .btn-row { display: flex; gap: 10px; margin-top: 15px; }
        .btn-main { flex: 2; background: linear-gradient(45deg, var(--p), var(--s)); color: #fff; text-decoration: none; text-align: center; padding: 12px; border-radius: 10px; font-weight: 900; font-size: 0.8rem; }
        .btn-sh { flex: 1; background: rgba(255,255,255,0.1); border-radius: 10px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-sh svg { width: 18px; fill: white; }

        @media (max-width: 600px) {
            header { padding: 10px 3%; }
            nav { gap: 5px; }
            .nav-btn { font-size: 0.6rem; padding: 5px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-box" onclick="adminLogin()">
            <div class="wolf-icon">
                <svg viewBox="0 0 24 24"><path d="M12 2s-1 2-2 4c-1.5 3-4 4.5-6 5 2 0 3.5.5 5 2 1.5 1.5 2 4 2 4s.5-2.5 2-4c1.5-1.5 3-2 5-2-2-.5-4.5-2-6-5-1-2-2-4-2-4z"/></svg>
            </div>
            <div class="logo-name">AYDAN</div>
        </div>
        <nav>
            <a class="nav-btn" onclick="location.reload()">Home</a>
            <a class="nav-btn" onclick="openCat('GAMES', 'NEON GAMES')">Games</a>
            <a class="nav-btn" onclick="openCat('APPS', 'POWER APPS')">Apps</a>
            <a class="nav-btn" onclick="openCat('LINK', 'LINKS')">Links</a>
            <a class="nav-btn" onclick="openCat('FILES', 'STORAGE')">Files</a>
        </nav>
    </header>

    <section id="hero">
        <h1 class="hero-title">AYDAN<br><span style="color:transparent; -webkit-text-stroke: 1px #fff;">HUB</span></h1>
    </section>

    <section id="content">
        <h2 id="view-title" style="margin-bottom:30px; text-transform:uppercase; color:var(--p);"></h2>
        <div class="grid" id="main-grid"></div>
    </section>

    <script>
        const SUPABASE_URL = 'https://tvasdkfdizdwkroatgno.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_UQ0g7DJ4_Um1nrAEd6z4nA_LnMUIcSA';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let items = [];

        async function load() {
            const { data } = await supabaseClient.from('files').select('*').order('created_at', { ascending: false });
            items = data || [];
        }

        function adminLogin() {
            const pass = prompt("Access Code:");
            if (pass === "aydan1234") {
                // Simplified redirect for Cloudflare
                window.location.href = "admin.html";
            } else if (pass !== null) {
                alert("Wrong Code");
            }
        }

        async function share(t, u) {
            if (navigator.share) { navigator.share({ title: t, url: u }); }
            else { navigator.clipboard.writeText(u); alert("Copied!"); }
        }

        function openCat(cat, label) {
            document.getElementById('hero').style.display = 'none';
            document.getElementById('content').style.display = 'block';
            document.getElementById('view-title').innerText = label;
            const filtered = items.filter(i => cat === 'FILES' ? (i.category === 'FILES' || i.category === 'HOME') : i.category === cat);
            const g = document.getElementById('main-grid');
            g.innerHTML = filtered.length ? filtered.map(i => `
                <div class="card">
                    <div class="card-img" style="background-image: url('${i.image_url || 'https://via.placeholder.com/400x200'}')"></div>
                    <h3 style="margin:0; font-size:1.1rem;">${i.title}</h3>
                    <div class="btn-row">
                        <a href="${i.url}" target="_blank" class="btn-main">GET</a>
                        <button class="btn-sh" onclick="share('${i.title}', '${i.url}')">
                            <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92c0-1.61-1.31-2.92-2.92-2.92z"/></svg>
                        </button>
                    </div>
                </div>
            `).join('') : `<p>No content in this section.</p>`;
            window.scrollTo(0,0);
        }
        load();
    </script>
</body>
</html>
