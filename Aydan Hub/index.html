<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="google-site-verification" content="pguMl4tskDKely2U8fS1zJ-V4GZD-fVGwDvB8wbOeVo" />
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#7d5fff">

    <title>Aydan Hub | Neon Metaverse</title>
    <meta name="description" content="Aydan Hub - The ultimate metaverse for free games, power apps, and quick links.">
    <meta name="keywords" content="Aydan Hub, Free Games, Metaverse, App Lab, Gaming Hub">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg-dark: #070512; 
            --accent-purple: #7d5fff; 
            --accent-pink: #ff00de;
            --accent-blue: #00d2ff;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        
        body { margin: 0; background-color: var(--bg-dark); color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; scroll-behavior: smooth; }

        .bg-flow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; background: #070512; }
        .blob { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.6; animation: move 20s infinite alternate; }
        .blob-1 { width: 600px; height: 600px; background: var(--accent-purple); top: -10%; right: -5%; }
        .blob-2 { width: 500px; height: 500px; background: var(--accent-pink); bottom: -10%; left: -5%; animation-duration: 15s; }
        @keyframes move { from { transform: translate(0,0) scale(1); } to { transform: translate(100px, 100px) scale(1.2); } }

        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px 8%; position: fixed; width: 100%; box-sizing: border-box; 
            z-index: 1000; background: rgba(7, 5, 18, 0.85); backdrop-filter: blur(20px); 
            border-bottom: 1px solid var(--glass-border); 
        }

        .logo-container { display: flex; align-items: center; gap: 15px; }
        .wolf-circle { width: 45px; height: 45px; background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink)); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 0 20px rgba(125, 95, 255, 0.5); }
        .logo-text { font-weight: 900; letter-spacing: 4px; font-size: 1.2rem; }

        nav { display: flex; gap: 20px; }
        .nav-link { color: rgba(255,255,255,0.6); text-decoration: none; text-transform: uppercase; font-size: 0.7rem; font-weight: 900; cursor: pointer; transition: 0.3s; letter-spacing: 1px; }
        .nav-link:hover { color: var(--accent-blue); text-shadow: 0 0 10px var(--accent-blue); }

        #hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 0 10%; }
        .hero-title { font-size: clamp(3rem, 10vw, 7rem); font-weight: 900; line-height: 0.9; text-transform: uppercase; }
        .hero-title span { color: transparent; -webkit-text-stroke: 1px rgba(255,255,255,0.3); }

        #content-section { display: none; padding: 140px 8% 100px; min-height: 100vh; }
        .view-title { font-size: clamp(2.5rem, 6vw, 4rem); font-weight: 900; text-transform: uppercase; margin-bottom: 40px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .tile { background: var(--glass); backdrop-filter: blur(30px); border: 1px solid var(--glass-border); border-radius: 24px; overflow: hidden; transition: 0.4s; }
        .tile-img { width: 100%; height: 160px; background-size: cover; background-position: center; border-bottom: 1px solid var(--glass-border); }
        .tile-body { padding: 25px; }

        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn-get { flex: 2; background: linear-gradient(45deg, var(--accent-purple), var(--accent-pink)); color: #fff; text-decoration: none; text-align: center; padding: 14px; border-radius: 12px; font-weight: 900; font-size: 0.8rem; }
        .btn-share { flex: 1; background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); color: #fff; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        @media (max-width: 768px) {
            header { flex-direction: column; padding: 15px; gap: 15px; }
            nav { width: 100%; justify-content: center; flex-wrap: wrap; gap: 8px; }
            .nav-link { background: rgba(255,255,255,0.05); padding: 6px 12px; border-radius: 15px; }
            #content-section { padding: 180px 5% 50px; } 
        }
    </style>
</head>
<body>

<section id="hero">
<h1 class="hero-title">WELCOME<span>TO</span><br>THE HUB.</h1>
</section>

</body>
</html>
